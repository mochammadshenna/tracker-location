name: Build Android APK

on:
    push:
        branches: ["main"]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Source Code
              uses: actions/checkout@v4

            - name: Setup JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: "17"
                  distribution: "temurin"

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v3
              with:
                  gradle-version: "7.6.3"

            - name: Download Xposed API JAR
              run: |
                  mkdir -p app/libs
                  echo "Downloading Xposed API JAR..."
                  URLS=(
                    "https://api.xposed.info/repository/de/robv/android/xposed/api/82/api-82.jar"
                    "https://gitlab.com/rovo89/XposedBridge/-/raw/master/api/api-82.jar"
                    "https://bitbucket.org/rovo89/xposedbridge/raw/master/api/api-82.jar"
                  )
                  for url in "${URLS[@]}"; do
                    echo "Trying: $url"
                    if curl -sfL -o app/libs/api-82.jar "$url"; then
                      echo "OK: Downloaded from $url"
                      break
                    fi
                    echo "FAILED"
                  done
                  if [ ! -f app/libs/api-82.jar ]; then
                    echo "ERROR: Could not download Xposed API JAR from any mirror"
                    exit 1
                  fi
                  ls -la app/libs/
                  file app/libs/api-82.jar

            - name: Generate Gradle Wrapper (if missing)
              run: |
                  if [ ! -f gradlew ]; then
                      echo "Generating Gradle wrapper..."
                      gradle wrapper --gradle-version 7.6.3
                  fi

            - name: Build Debug APK
              run: ./gradlew :app:assembleDebug

            - name: Upload APK
              uses: actions/upload-artifact@v4
              with:
                  name: TrackerLocation-v2.0
                  path: app/build/outputs/apk/debug/*.apk
